name: TaskTracker CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  backend-build:
    name: Backend Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: corretto
          java-version: '17'

      - name: Build backend
        working-directory: backend/tasktracker
        run: ./mvnw clean package -DskipTests

  terraform-validate:
    name: Terraform Validate
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build backend artifact for Terraform validation
        working-directory: backend/tasktracker
        run: |
          ./mvnw clean package -DskipTests
          mkdir -p ../../artifacts
          cp target/*.jar ../../artifacts/tasktracker.jar

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform init without backend
        working-directory: infra/terraform/env/dev
        run: terraform init -backend=false

      - name: Terraform fmt check
        working-directory: infra/terraform/env/dev
        run: terraform fmt -recursive -check

      - name: Terraform validate
        working-directory: infra/terraform/env/dev
        run: terraform validate