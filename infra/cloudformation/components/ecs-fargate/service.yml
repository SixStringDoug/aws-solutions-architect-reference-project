AWSTemplateFormatVersion: "2010-09-09"
Description: "ECS/Fargate service for TaskTracker backend"

Parameters:
  Project:
    Type: String
    Default: tasktracker

  Environment:
    Type: String
    Default: dev

  NamePrefix:
    Type: String
    Default: tasktracker-dev

  ClusterName:
    Type: String

  VpcId:
    Type: String

  PublicSubnetIds:
    Type: String

  TaskSubnetIds:
    Type: String

  AssignPublicIp:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED

  TasksSecurityGroupId:
    Type: String

  ContainerImage:
    Type: String

  AttachmentsBucketName:
    Type: String

  DbHost:
    Type: String

  DbPort:
    Type: String

  DbName:
    Type: String

  DbUsernameParameter:
    Type: String

  DbPasswordParameter:
    Type: String

  ContainerPort:
    Type: Number
    Default: 8080

  DesiredCount:
    Type: Number
    Default: 1

  TargetGroupArn:
    Type: String

  HealthCheckGracePeriodSeconds:
    Type: Number
    Default: 120

  MaximumPercent:
    Type: Number
    Default: 200

  MinimumHealthyPercent:
    Type: Number
    Default: 100

Resources:

  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-ecs-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
      Policies:
        - PolicyName: !Sub "${NamePrefix}-execution-ssm-access"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadDbParameters
                Effect: Allow
                Action:
                  - ssm:GetParameters
                  - ssm:GetParameter
                Resource:
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DbUsernameParameter}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${DbPasswordParameter}"
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  EcsTaskRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-ecs-task-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: !Sub "${NamePrefix}-task-s3-access"
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ListBucket
                Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${AttachmentsBucketName}"
              - Sid: ObjectAccess
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:DeleteObject
                Resource: !Sub "arn:aws:s3:::${AttachmentsBucketName}/*"
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  EcsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${NamePrefix}-backend"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      TaskRoleArn: !GetAtt EcsTaskRole.Arn
      ContainerDefinitions:
        - Name: tasktracker-backend
          Image: !Ref ContainerImage
          Essential: true
          Environment:
            - Name: SPRING_PROFILES_ACTIVE
              Value: fargate
            - Name: DB_URL
              Value: !Sub "jdbc:postgresql://${DbHost}:${DbPort}/${DbName}"
          Secrets:
            - Name: DB_USERNAME
              ValueFrom: !Ref DbUsernameParameter
            - Name: DB_PASSWORD
              ValueFrom: !Ref DbPasswordParameter
          PortMappings:
            - ContainerPort: !Ref ContainerPort
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Sub "/${NamePrefix}/ecs"
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: backend

  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${NamePrefix}-service"
      Cluster: !Ref ClusterName
      LaunchType: FARGATE
      DesiredCount: !Ref DesiredCount
      HealthCheckGracePeriodSeconds: !Ref HealthCheckGracePeriodSeconds
      DeploymentConfiguration:
        MaximumPercent: !Ref MaximumPercent
        MinimumHealthyPercent: !Ref MinimumHealthyPercent
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true
      TaskDefinition: !Ref EcsTaskDefinition
      LoadBalancers:
        - TargetGroupArn: !Ref TargetGroupArn
          ContainerName: tasktracker-backend
          ContainerPort: !Ref ContainerPort
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: !Ref AssignPublicIp
          SecurityGroups:
            - !Ref TasksSecurityGroupId
          Subnets:
            Fn::Split:
              - ","
              - !Ref TaskSubnetIds

Outputs:
  TaskDefinitionArn:
    Value: !Ref EcsTaskDefinition

  ServiceName:
    Value: !Ref EcsService