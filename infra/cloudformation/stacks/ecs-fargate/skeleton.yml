AWSTemplateFormatVersion: "2010-09-09"
Description: "TaskTracker ECS/Fargate skeleton stack (modular)"

Parameters:
  Project:
    Type: String
    Default: tasktracker

  Environment:
    Type: String
    Default: dev

  NamePrefix:
    Type: String
    Default: tasktracker-dev

  ArtifactBucket:
    Type: String
    Description: S3 bucket containing reusable CloudFormation components

  ArtifactPrefix:
    Type: String
    Description: Prefix/path inside the artifact bucket where components are stored

  LogRetentionDays:
    Type: Number
    Default: 7

  ContainerImage:
    Type: String
    Description: Full ECR image URI including tag

  VpcId:
    Type: String

  PublicSubnetIds:
    Type: String

  TaskSubnetIds:
    Type: String

  AssignPublicIp:
    Type: String
    Default: ENABLED
    AllowedValues:
      - ENABLED
      - DISABLED

  DesiredCount:
    Type: Number
    Default: 1

  EnableServiceAutoScaling:
    Type: String
    Default: "false"
    AllowedValues:
      - "true"
      - "false"

  ServiceMinCapacity:
    Type: Number
    Default: 2

  ServiceMaxCapacity:
    Type: Number
    Default: 3

  ServiceCpuTargetValue:
    Type: Number
    Default: 60

  AlbSecurityGroupId:
    Type: String

  TasksSecurityGroupId:
    Type: String

Conditions:
  EnableServiceAutoScalingCondition: !Equals [!Ref EnableServiceAutoScaling, "true"]

Resources:

  ApplicationLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${NamePrefix}-alb"
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSecurityGroupId
      Subnets: !Split [",", !Ref PublicSubnetIds]
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  AlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${NamePrefix}-tg"
      Port: 8080
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 3
      UnhealthyThresholdCount: 5
      Matcher:
        HttpCode: "200"
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ApplicationLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AlbTargetGroup

  FargateHealthyHostCountAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${NamePrefix}-fargate-healthy-host-count-low"
      AlarmDescription: "Alarm when the Fargate target group has no healthy targets"
      Namespace: AWS/ApplicationELB
      MetricName: HealthyHostCount
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: LessThanThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: TargetGroup
          Value: !GetAtt AlbTargetGroup.TargetGroupFullName
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  FargateAlbTarget5xxAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${NamePrefix}-fargate-alb-target-5xx"
      AlarmDescription: "Alarm when Fargate ALB targets return 5XX errors"
      Namespace: AWS/ApplicationELB
      MetricName: HTTPCode_Target_5XX_Count
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      Dimensions:
        - Name: TargetGroup
          Value: !GetAtt AlbTargetGroup.TargetGroupFullName
        - Name: LoadBalancer
          Value: !GetAtt ApplicationLoadBalancer.LoadBalancerFullName
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/${NamePrefix}/ecs"
      RetentionInDays: !Ref LogRetentionDays
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${NamePrefix}-cluster"
      Tags:
        - Key: Project
          Value: !Ref Project
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: cloudformation

  EcsService:
    Type: AWS::CloudFormation::Stack
    DependsOn:
      - AlbListener
    Properties:
      TemplateURL: !Sub "https://${ArtifactBucket}.s3.${AWS::Region}.amazonaws.com/${ArtifactPrefix}/components/ecs-fargate/service.yml"
      Parameters:
        Project: !Ref Project
        Environment: !Ref Environment
        NamePrefix: !Ref NamePrefix
        ClusterName: !Ref EcsCluster
        VpcId: !Ref VpcId
        PublicSubnetIds: !Ref PublicSubnetIds
        TaskSubnetIds: !Ref TaskSubnetIds
        AssignPublicIp: !Ref AssignPublicIp
        DesiredCount: !Ref DesiredCount
        TasksSecurityGroupId: !Ref TasksSecurityGroupId
        ContainerImage: !Ref ContainerImage
        AttachmentsBucketName: !Sub "${NamePrefix}-attachments"
        DbHost: !Sub "{{resolve:ssm:/tasktracker-dev/db/host}}"
        DbPort: !Sub "{{resolve:ssm:/tasktracker-dev/db/port}}"
        DbName: tasktrackerdevpostgres
        DbUsernameParameter: /tasktracker-dev/db/username
        DbPasswordParameter: /tasktracker-dev/db/password
        TargetGroupArn: !Ref AlbTargetGroup
        ContainerPort: "8080"
        HealthCheckGracePeriodSeconds: "60"
        MaximumPercent: "200"
        MinimumHealthyPercent: "100"

  EcsServiceScalableTarget:
    Type: AWS::ApplicationAutoScaling::ScalableTarget
    Condition: EnableServiceAutoScalingCondition
    DependsOn:
      - EcsService
    Properties:
      MaxCapacity: !Ref ServiceMaxCapacity
      MinCapacity: !Ref ServiceMinCapacity
      ResourceId: !Sub "service/${EcsCluster}/tasktracker-dev-service"
      RoleARN: !Sub arn:aws:iam::${AWS::AccountId}:role/aws-service-role/ecs.application-autoscaling.amazonaws.com/AWSServiceRoleForApplicationAutoScaling_ECSService
      ScalableDimension: ecs:service:DesiredCount
      ServiceNamespace: ecs

  EcsServiceCpuScalingPolicy:
    Type: AWS::ApplicationAutoScaling::ScalingPolicy
    Condition: EnableServiceAutoScalingCondition
    DependsOn:
      - EcsServiceScalableTarget
    Properties:
      PolicyName: !Sub "${NamePrefix}-fargate-cpu-target-tracking"
      PolicyType: TargetTrackingScaling
      ScalingTargetId: !Ref EcsServiceScalableTarget
      TargetTrackingScalingPolicyConfiguration:
        TargetValue: !Ref ServiceCpuTargetValue
        PredefinedMetricSpecification:
          PredefinedMetricType: ECSServiceAverageCPUUtilization
        ScaleInCooldown: 120
        ScaleOutCooldown: 60

Outputs:
  ClusterName:
    Value: !Ref EcsCluster

  VpcId:
    Value: !Ref VpcId

  PublicSubnetIds:
    Value: !Ref PublicSubnetIds

  TasksSecurityGroupId:
    Value: !Ref TasksSecurityGroupId

  ServiceName:
    Description: ECS service name
    Value: !GetAtt EcsService.Outputs.ServiceName

  AlbDnsName:
    Value: !GetAtt ApplicationLoadBalancer.DNSName

  FargateHealthyHostCountAlarmName:
    Value: !Ref FargateHealthyHostCountAlarm

  FargateAlbTarget5xxAlarmName:
    Value: !Ref FargateAlbTarget5xxAlarm