spring.application.name=tasktracker
server.port=8080

# ----------------------------
# Environment selection
# ----------------------------
# local | ec2 | fargate
app.env=${APP_ENV:local}

# ----------------------------
# AWS (safe defaults)
# ----------------------------
aws.region=${AWS_REGION:us-east-2}
aws.s3.bucketName=${AWS_S3_BUCKET:aws-saa-tasktracker-bucket-dp}

# Prefer IAM roles in AWS; only used locally if explicitly set
cloud.aws.credentials.access-key=${AWS_ACCESS_KEY_ID:}
cloud.aws.credentials.secret-key=${AWS_SECRET_ACCESS_KEY:}

# ----------------------------
# Database (portable contract)
# ----------------------------
# Local fallback remains H2 only when DB_* env vars are not provided.
# In AWS Phase 4, ECS/Fargate should provide DB_URL / DB_USERNAME / DB_PASSWORD
spring.datasource.url=${DB_URL:jdbc:h2:mem:testdb}
spring.datasource.username=${DB_USERNAME:sa}
spring.datasource.password=${DB_PASSWORD:}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false